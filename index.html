 "_rx": "12", "_tend": "C", "_hosp": "", "_ubic": "", "_hor": "Lun y Vie 1-3", "_esp": "Pediatría", "_br_cls": "", "_notas": "Edificio Río (Plaza Financiera), después de la Integra. Solo recibe lunes y viernes. | Lunes y viernes 1-3pm. Edificio Río. | Av. Moctezuma 887, Ensenada. Es con cita. | Consultorio 201", "_cita": {"strict": true, "wa": false, "contact": "", "tel": "", "all_tels": [], "method": "confirm", "raw_note": "Edificio Río (Plaza Financiera), después de la Integra. Solo recibe lunes y viernes. | Lunes y viernes 1-3pm. Edificio Río. | Av. Moctezuma 887, Ensen"}}, {"n": "López Méndez Jaime", "c": "", "t": "13:30", "tp": "", "_prod": "Poly Vi Gomis", "_comp": "Vitalica", "_ms": "100", "_rx": "5", "_tend": "D", "_hosp": "IMSS HGR 20 TIJUANA", "_ubic": "IMSS HGR 20 TIJUANA", "_hor": "Lun, Jue y Vie 664686973-8", "_esp": "Pediatría", "_br_cls": "", "_notas": "Tel: +52 664 686 9738. Recibe todo menos fórmula."}, {"n": "Brambila De La Cruz Irene", "c": "3", "t": "14:00", "tp": "f2", "_prod": "Poly Vi Gomis", "_comp": "Vitalica", "_ms": "", "_rx": "", "_tend": "", "_hosp": "CLINICA MEDGIN", "_ubic": "CLINICA MEDGIN", "_hor": "", "_esp": "Pediatría", "_br_cls": "", "_notas": ""}, {"n": "Santos Escalante María Pamela", "c": "", "t": "14:30", "tp": "moved", "_prod": "", "_comp": "", "_ms": "", "_rx": "", "_tend": "", "_hosp": "", "_ubic": "", "_hor": "", "_esp": "", "_br_cls": "", "_notas": ""}, {"n": "Rodríguez De Alva Antonio", "c": "3", "t": "15:00", "tp": "", "_prod": "Proteflor", "_comp": "Enterogermina", "_ms": "", "_rx": "", "_tend": "", "_hosp": "HOSPITAL RENACIMIENTO", "_ubic": "HOSPITAL RENACIMIENTO", "_hor": "", "_esp": "Medicina General", "_br_cls": "", "_notas": ""}, {"n": "Flores Torres Alejandrina", "c": "", "t": "15:30", "tp": "", "_prod": "", "_comp": "Enterogermina", "_ms": "", "_rx": "", "_tend": "", "_hosp": "CLINICA LAS FUENTES", "_ubic": "CLINICA LAS FUENTES", "_hor": "Lun-Vie 3-8", "_esp": "Medicina General", "_br_cls": "", "_notas": ""}]}};
const W=[
 {l:'Sem 1 · Jun 8-12',days:['D1','D2','D3','D4','D5']},
 {l:'Sem 2 · Jun 15-19',days:['D6','D7','D8','D9','D10']},
 {l:'Sem 3 · Jun 22-26',days:['D11','D12','D13','D14','D15']},
 {l:'Sem 4 · Jun 29-Jul 3',days:['D16','D17','D18','D19','D20']}
];
const CLS_MAP={DEFENDER:'cls-def',ATACAR_PRIO:'cls-atk',ATACAR_SEC:'cls-atk',RECUPERAR:'cls-rec',MONITOREAR:'cls-mon'};
const CLS_LABEL={DEFENDER:'🟢 Defender',ATACAR_PRIO:'🔵 Atacar Prio',ATACAR_SEC:'🔵 Atacar Sec',RECUPERAR:'🔴 Recuperar',MONITOREAR:'🟡 Monitorear'};
let cw=0;

function dcls(doc){
  if(doc.tp==='cita') return 'di ct';
  if(doc.tp==='add')  return 'di ad';
  if(doc.c==='1')     return 'di p1';
  if(doc.c==='2')     return 'di p2';
  if(doc.tp==='moved')return 'di mv';
  if(doc.tp==='f2')   return 'di f2';
  return 'di';
}

function renderTabs(){
  const t=document.getElementById('tabs'); t.innerHTML='';
  W.forEach((w,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===cw?' active':'');
    b.textContent=w.l; b.onclick=()=>{cw=i;render();};
    t.appendChild(b);
  });
}

function renderNote(){
  const n=document.getElementById('wnote');
  n.innerHTML=cw===1?'<div class="wnote note-ens">📍 D6 Lun · D7 Mar · D8 Mié → Ensenada &nbsp;|&nbsp; D9 Jue → Rosarito &nbsp;|&nbsp; D10 Vie → Tijuana centro</div>':'';
}

function renderGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  W[cw].days.forEach(dk=>{
    const day=C[dk]; if(!day) return;
    const vc=day.docs.filter(d=>d.tp!=='skip').length;
    const sorted=[...day.docs].sort((a,b)=>{
      const ta=(a.t_sched||a.t||'99:00').split('–')[0].replace('⚙️','').trim();
      const tb=(b.t_sched||b.t||'99:00').split('–')[0].replace('⚙️','').trim();
      const [ah,am]=ta.split(':').map(Number); const [bh,bm]=tb.split(':').map(Number);
      return (ah*60+(am||0))-(bh*60+(bm||0));
    });
    const docIdx={}; day.docs.forEach((d,i)=>docIdx[d.n]=i);
    const zc=day.z;
    let h=`<div class="dc ${zc!=='tij'?zc:''}">
<div class="dh ${zc}-h">
  <div class="dn">${dk} — ${day.d}<span class="cnt${vc>=11?' full':''}">${vc}</span></div>
  <div class="dm">${day.title}</div>
</div><div class="dl">`;
    let ord=1;
    sorted.forEach(doc=>{
      const isCita=doc.tp==='cita';
      const idx=docIdx[doc.n];
      const t=doc.t_sched||doc.t||'';
      const est=!doc.hor_known&&!isCita;
      const hasCitaReq=!!doc._cita;
      const isStrict=hasCitaReq&&doc._cita.strict;
      h+=`<div class="${dcls(doc)}" onclick="showM('${dk}',${idx})">`;
      h+=`<div class="dnum">${isCita?'★':ord++}</div>`;
      h+=`<div class="dbody"><div class="dname">`;
      h+=isCita?doc.n.replace('★ CITA — ',''):doc.n.split(' ').slice(0,3).join(' ');
      if(doc.c==='1')      h+=`<span class="cb c1">C1</span>`;
      else if(doc.c==='2') h+=`<span class="cb c2">C2</span>`;
      if(doc.tp==='moved') h+=`<span class="cb ca">↑</span>`;
      if(doc.tp==='f2')    h+=`<span class="cb cm">×2</span>`;
      if(isCita)           h+=`<span class="cb cc">CITA</span>`;
      if(doc.tp==='add')   h+=`<span class="cb cadd">+</span>`;
      if(isStrict)         h+=`<span class="cb cita-req">🗓️ cita</span>`;
      else if(hasCitaReq)  h+=`<span class="cb cita-req">📲</span>`;
      h+=`</div>`;
      if(t) h+=`<div class="dtime${est?' est':''}">${t}${est?' ⚙️':''}</div>`;
      h+=`</div></div>`;
    });
    h+=`</div></div>`;
    g.innerHTML+=h;
  });
}

function fmtTel(tel){
  if(!tel) return '';
  const clean=tel.replace(/\D/g,'');
  return clean.length>=10 ? '+'+clean : tel;
}

function showM(dk,idx){
  const doc=C[dk].docs[idx];
  const cn=doc.n.replace('★ CITA — ','');
  const t=doc.t_sched||doc.t||'';
  document.getElementById('mo-name').textContent=cn;
  const esp=doc._esp||''; const hosp=doc._hosp||'';
  document.getElementById('mo-meta').innerHTML=
    `<span>${C[dk].d} · ${dk}${t?' · '+t:''}</span>`+
    (esp?`<span>· ${esp}</span>`:'')+
    (hosp?`<span>· ${hosp}</span>`:'');
  let badges='';
  if(doc.c==='1') badges+=`<span class="cb c1" style="font-size:11px;padding:3px 9px">Cat 1 ⭐</span>`;
  if(doc.c==='2') badges+=`<span class="cb c2" style="font-size:11px;padding:3px 9px">Cat 2</span>`;
  if(doc.tp==='f2')    badges+=`<span class="cb cm" style="font-size:11px;padding:3px 9px">Frec 2</span>`;
  if(doc.tp==='moved') badges+=`<span class="cb ca" style="font-size:11px;padding:3px 9px">Reubicado</span>`;
  if(doc.tp==='add')   badges+=`<span class="cb cadd" style="font-size:11px;padding:3px 9px">+CRM</span>`;
  if(doc.tp==='cita')  badges+=`<span class="cb cc" style="font-size:11px;padding:3px 9px">Cita fija</span>`;
  if(doc._cita&&doc._cita.strict) badges+=`<span class="cb cita-req" style="font-size:11px;padding:3px 9px">🗓️ Req. cita</span>`;
  else if(doc._cita)              badges+=`<span class="cb cita-req" style="font-size:11px;padding:3px 9px">📲 Contactar previo</span>`;
  document.getElementById('mo-badges').innerHTML=badges;

  let body='';

  // CITA SECTION — first and prominent if needed
  if(doc._cita){
    const ci=doc._cita;
    const isStrict=ci.strict;
    const method=ci.wa?'WhatsApp':ci.method==='call'?'Llamada':'Confirmar';
    const icon=ci.wa?'📲':'📞';
    body+=`<div class="cita-box${isStrict?' strict':''}">`;
    body+=`<div class="cita-title">${isStrict?'🗓️ Esta visita ES POR CITA':'📲 Contactar antes de visitar'}</div>`;
    if(ci.contact){
      body+=`<div class="cita-row"><span class="cita-label">Con quién</span><span class="cita-val">${ci.contact}</span></div>`;
    }
    if(ci.tel){
      const telNum=fmtTel(ci.tel);
      const href=ci.wa?`https://wa.me/${ci.tel.replace(/\D/g,'')}`:`tel:${telNum}`;
      const cls=ci.wa?'wa-link':'call-link';
      body+=`<div class="cita-row"><span class="cita-label">Vía</span><span class="cita-val">${method}</span></div>`;
      body+=`<div style="margin-top:8px"><a href="${href}" class="tel-link ${cls}">${icon} ${telNum}</a></div>`;
    } else {
      body+=`<div class="cita-row"><span class="cita-label">Vía</span><span class="cita-val">${method}</span></div>`;
    }
    // Extra tels
    if(ci.all_tels&&ci.all_tels.length>1){
      ci.all_tels.slice(1).forEach(t2=>{
        const t2f=fmtTel(t2);
        body+=`<a href="tel:${t2f}" class="tel-link call-link" style="margin-top:4px;margin-left:0">📞 ${t2f}</a>`;
      });
    }
    body+=`</div>`;
  }

  // Horario
  const hor=doc._hor||doc.hor||'';
  const horKnown=doc.hor_known||!!hor;
  body+=`<div class="fi"><div class="fl">🕐 Horario</div><div class="fv">${horKnown&&hor?hor:'<span class=empty>Sin registrar ⚙️ estimado</span>'}</div></div>`;

  // Ubicación
  const ubic=doc._ubic||''; const hsp=doc._hosp||'';
  if(ubic||hsp){
    body+=`<div class="fi"><div class="fl">📍 Ubicación</div><div class="loc-box">`;
    if(hsp) body+=`<div class="loc-n">${hsp}</div>`;
    if(ubic&&ubic!==hsp) body+=`<div class="loc-a">${ubic}</div>`;
    body+=`</div></div>`;
  }

  // Producto
  const prod=doc._prod||'';
  body+=`<div class="fi"><div class="fl">💊 Producto</div><div class="fv">${prod?`<span class="pp">${prod}</span>`:'<span class=empty>Por asignar</span>'}</div></div>`;

  // Competidor
  const comp=doc._comp||'';
  body+=`<div class="fi"><div class="fl">⚔️ Competidor</div><div class="fv">${comp?`<span class="cp">${comp}</span>`:'<span class=empty>Sin datos</span>'}</div></div>`;

  // Stats
  if(doc._ms||doc._rx||doc._tend){
    body+=`<div class="fi"><div class="fl">📊 Posición</div><div class="stats-row">`;
    if(doc._ms) body+=`<div class="stat"><b>${doc._ms}%</b>Market Share</div>`;
    if(doc._rx) body+=`<div class="stat"><b>${doc._rx}</b>Recetas</div>`;
    if(doc._tend) body+=`<div class="stat"><b>${doc._tend==='C'?'↑ Crece':doc._tend==='D'?'↓ Cae':doc._tend}</b>Tendencia</div>`;
    body+=`</div></div>`;
  }

  // BR
  const br=doc._br_cls||'';
  if(br&&CLS_LABEL[br]) body+=`<div class="fi"><div class="fl">🎯 BR</div><div class="fv"><span class="cls-badge ${CLS_MAP[br]||''}">${CLS_LABEL[br]}</span></div></div>`;

  // Notas
  const notas=doc._notas||doc.note||'';
  if(notas){
    const al=notas.toLowerCase().includes('no llevar')||notas.toLowerCase().includes('cinthya');
    body+=`<div class="fi"><div class="fl">📝 Notas</div><div class="note-box${al?' alert':''}">${notas}</div></div>`;
  }

  document.getElementById('mo-body').innerHTML=body;
  document.getElementById('ov').classList.add('show');
}
function closeM(){document.getElementById('ov').classList.remove('show');}
function render(){renderTabs();renderNote();renderGrid();}
render();
</script></body></html>
